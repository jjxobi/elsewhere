name: Data Refresh (Manual Only)
#
# NOTE: The scheduled monthly cron trigger has been removed. Numbeo blocks
# requests from GitHub Actions' hosted-runner IP ranges (confirmed via
# testing - same class of issue as Expatistan's bot-blocking, just a
# softer 503 error instead of a hard 403). This is a network-level block
# that headers/user-agents cannot work around.
#
# This workflow is kept for manual/local-runner use only. To actually
# refresh the data, run the pipeline locally (see README.md) - it works
# fine from a normal residential/home IP.

on:
  workflow_dispatch:       # manual trigger only - see note above

permissions:
  contents: write   # needed so the final 'git push' step can commit back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore geocode cache
        uses: actions/cache@v5
        with:
          path: data/raw/geocode_cache.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: |
            geocode-cache-

      - name: Scrape Numbeo
        run: python pipeline/scrape_numbeo.py

      - name: Fetch World Bank PPP
        run: python pipeline/fetch_worldbank.py

      - name: Fetch internet speed data
        run: python pipeline/fetch_speedtest.py

      - name: Geocode cities
        run: python pipeline/geocode_cities.py

      - name: Build master dataset
        run: python pipeline/build_master.py

      - name: Commit updated data
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/master_data.csv
          git diff --staged --quiet || git commit -m "Automated monthly data refresh $(date +'%Y-%m')"
          git push
